name: Release

# 带 tag 名进 run title, 列表里直接显示 "Release v0.2.2" 而不是 "Release #26"。
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish-images:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Aliyun ACR secrets
        id: acr
        run: |
          if [ -n "${{ secrets.ACR_USERNAME }}" ] && [ -n "${{ secrets.ACR_NAMESPACE }}" ] && [ -n "${{ secrets.ACR_REGISTRY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        if: steps.acr.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            name=ghcr.io/${{ github.repository_owner }}/dev-anywhere-relay
            name=${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/dev-anywhere-relay,enable=${{ steps.acr.outputs.enabled == 'true' }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/relay/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dev-anywhere-relay
          cache-to: type=gha,mode=max,scope=dev-anywhere-relay

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Read release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Verify npm auth
        run: |
          npm whoami
          npm owner ls @dev-anywhere/proxy
          npm owner ls @dev-anywhere/relay

      - name: Publish @dev-anywhere/relay
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "@dev-anywhere/relay@$VERSION" version >/dev/null 2>&1; then
            echo "@dev-anywhere/relay@$VERSION is already published"
          else
            pnpm --filter @dev-anywhere/relay publish --no-git-checks --access public
          fi

      - name: Publish @dev-anywhere/proxy
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "@dev-anywhere/proxy@$VERSION" version >/dev/null 2>&1; then
            echo "@dev-anywhere/proxy@$VERSION is already published"
          else
            pnpm --filter @dev-anywhere/proxy publish --no-git-checks --access public
          fi

      - name: Verify npm packages are published
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for pkg in @dev-anywhere/proxy @dev-anywhere/relay; do
            for attempt in $(seq 1 12); do
              published="$(npm view "$pkg@$VERSION" version 2>/dev/null || true)"
              if [ "$published" = "$VERSION" ]; then
                echo "$pkg@$VERSION is available on npm"
                break
              fi
              if [ "$attempt" = "12" ]; then
                echo "ERROR: $pkg@$VERSION is not available on npm" >&2
                exit 1
              fi
              sleep 5
            done
          done
