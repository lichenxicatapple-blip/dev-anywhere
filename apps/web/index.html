<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#F6F7F8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1E1E1E" media="(prefers-color-scheme: dark)" />
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("dev_anywhere_theme");
          const resolvedTheme =
            theme === "dark" || theme === "light"
              ? theme
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document
            .querySelector('meta[name="color-scheme"]')
            ?.setAttribute("content", resolvedTheme);
          if (theme === "light" || theme === "dark") {
            document.documentElement.dataset.theme = theme;
            const color = theme === "light" ? "#F6F7F8" : "#1E1E1E";
            document.querySelectorAll('meta[name="theme-color"]').forEach((meta) => {
              meta.setAttribute("content", color);
            });
          }
        } catch {}
      })();
    </script>
    <title>DEV Anywhere</title>

    <meta
      name="description"
      content="本地 AI CLI 透明代理和远程镜像: 在浏览器中实时查看和接管本地开发会话"
    />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DEV Anywhere" />

    <link rel="icon" type="image/svg+xml" href="/brand-icon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/pwa-64x64.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
