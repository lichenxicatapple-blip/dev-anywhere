services:
  relay:
    build:
      context: ../..
      dockerfile: apps/relay/Dockerfile
    container_name: dev-anywhere-relay
    restart: unless-stopped
    environment:
      - PORT=3100
      - LOG_LEVEL=info
      - DATA_DIR=/data
      - HEARTBEAT_INTERVAL=30000
      - RELAY_PROXY_TOKEN=${RELAY_PROXY_TOKEN:-}
      - RELAY_CLIENT_TOKEN=${RELAY_CLIENT_TOKEN:-}
    volumes:
      - relay-data:/data
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  relay-data:
