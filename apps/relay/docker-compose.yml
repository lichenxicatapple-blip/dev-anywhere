services:
  relay:
    build:
      context: ../..
      dockerfile: apps/relay/Dockerfile
    container_name: dev-anywhere-relay
    restart: unless-stopped
    environment:
      - PORT=3100
      - LOG_LEVEL=info
      - DATA_DIR=/data
      - HEARTBEAT_INTERVAL=30000
      - RELAY_PROXY_TOKEN=${RELAY_PROXY_TOKEN:-}
    volumes:
      - relay-data:/data
    expose:
      - "3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: dev-anywhere-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      relay:
        condition: service_healthy

volumes:
  relay-data:
