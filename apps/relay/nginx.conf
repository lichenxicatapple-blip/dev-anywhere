upstream relay_backend {
    server relay:3100;
}

# HTTP -> HTTPS 重定向 (Let's Encrypt challenge 除外)
server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/relay/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # WebSocket 端点 (proxy 注册 + client 订阅)
    location ~ ^/(proxy|client)$ {
        proxy_pass http://relay_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # Relay HTTP API: 字体 / 健康 / 状态
    location ~ ^/(fonts|health|status|api)(/.*)?$ {
        proxy_pass http://relay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite 指纹化静态资源, 强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # workbox-*.js 文件名含内容哈希, 可长缓存
    location ~ ^/workbox-.*\.js$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service Worker 必须每次回源, 否则新版本发布后旧 SW 不更新
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # PWA manifest: 部分旧版 nginx mime.types 不含 .webmanifest, 显式声明避免浏览器拒识
    location = /manifest.webmanifest {
        types { }
        default_type application/manifest+json;
        try_files $uri =404;
    }

    # SPA fallback: 其他路径一律回 index.html (hash 路由自己在客户端解析 #/...)
    location / {
        try_files $uri /index.html;
    }
}
